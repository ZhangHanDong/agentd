[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # Matrix SDK 0.16.1 (and current 0.18.0) uses aquamarine 0.6, whose
    # compile-time proc-macro dependency has no maintained release to upgrade to.
    { id = "RUSTSEC-2026-0173", reason = "unavoidable compile-time dependency of supported Matrix SDK releases; no runtime exposure" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.93
exceptions = [
    # Mozilla root certificate data distributed by rustls/webpki.
    { allow = ["CDLA-Permissive-2.0"], crate = "webpki-roots@1" },
    # OSI-approved permissive license used by Matrix SDK's bloom filter.
    { allow = ["BSL-1.0"], crate = "xxhash-rust@0.8" },
]

[bans]
multiple-versions = "warn"
# Registry deps must be version-pinned (no `*`), but workspace-internal path
# deps (agentctl -> agentd-core, and agentd-core's self test-support dev-dep)
# are intentionally version-less path references, not real wildcards.
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
